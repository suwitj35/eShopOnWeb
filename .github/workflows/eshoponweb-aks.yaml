name: container workflow

on: workflow_dispatch

env:
  acr_login_server: aistraining.azurecr.io
  TAG_NAME: eshopping_suwit:1.0.0
  IMAGE_NAME: aistraining.azurecr.io/eshopping_suwit:1.0.0
jobs: 
  build-container:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source code
        uses: actions/checkout@v7.0.0
  
      - name: Acr Login
        uses: docker/login-action@v4.4.0
        with:
          registry: ${{ env.acr_login_server }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
  
  
      - name: Build and Push Image
        run: |
          docker build -f src/Web/Dockerfile -t ${{ env.ACR_LOGIN_SERVICE }}/${{ env.TAG_NAME }} .
          docker push ${{ env.ACR_LOGIN_SERVICE }}/${{ env.TAG_NAME }}








