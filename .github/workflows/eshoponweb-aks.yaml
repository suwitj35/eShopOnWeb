name: Container Workflow
on: workflow_dispatch
 
env:
  ACR_LOGIN_SERVICE: aistraining.azurecr.io
  TAG_NAME: eshopping_suwit:1.0.0
  IMAGE_NAME: aistraining.azurecr.io/eshopping_suwit:1.0.0
  resource-group: ais-training
  cluster-name: aks-demo
 
jobs:
  build-Container:
    #if: false 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0
 
      - name: ACR Login
        uses: azure/docker-login@v1
        with:
          registry: ${{ env.ACR_LOGIN_SERVICE }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
 
      - name: Build and Push Docker Image2
        run: |
          docker build -f src/Web/Dockerfile -t ${{ env.ACR_LOGIN_SERVICE }}/${{ env.TAG_NAME }} .
          docker push ${{ env.ACR_LOGIN_SERVICE }}/${{ env.TAG_NAME }}
  deploy-to-aks:
    runs-on: ubuntu-latest
    needs: build-Container
    steps:
      - uses: actions/checkout@7.0.0
      - uses: azure/aks-set-context@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          resource-group: ${{ env.RESOURCE_GROUP }}
          cluster-name: ${{ env.CLUSTER_NAME }}
      - uses: azure/k8s-deploy@v1
        with:
          manifests: |
            .k8s/deployment.yaml
            .k8s/service.yaml
          images: ${{ env.ACR_LOGIN_SERVER }}/${{ env.TAG_NAME }}
            


 
   
